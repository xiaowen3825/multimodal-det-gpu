# =============================================================================
# 默认训练配置
# =============================================================================

# --- 数据集 ---
data:
  dataset: "coco"
  root: "./datasets/coco"
  train_ann: "annotations/instances_train2017.json"
  val_ann: "annotations/instances_val2017.json"
  train_img_dir: "train2017"
  val_img_dir: "val2017"
  subset_ratio: 0.2          # 使用20%训练数据，CPU友好
  img_size: 640
  num_workers: 8
  prefetch_factor: 4

# --- 数据增强 ---
augmentation:
  mosaic_prob: 0.5
  mixup_prob: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flip_lr: 0.5
  scale: [0.5, 1.5]
  translate: 0.1

# --- 训练 ---
train:
  epochs: 50
  batch_size: 2
  gradient_accumulation: 8    # 等效batch_size = 16
  warmup_epochs: 3
  initial_lr: 0.001
  final_lr: 0.0001
  weight_decay: 0.0005
  momentum: 0.937
  scheduler: "cosine"
  clip_grad_norm: 10.0

# --- CPU优化 ---
cpu:
  num_threads: 0              # 0表示自动检测物理核心数
  enable_compile: false       # 关闭(与transformers CLIP不兼容)
  compile_mode: "reduce-overhead"
  enable_bf16: true           # Intel CPU bf16支持
  pin_memory: false

# --- 检查点 ---
checkpoint:
  save_dir: "./runs"
  save_interval: 5            # 每5个epoch保存
  keep_last: 3                # 保留最近3个checkpoint
  save_best: true

# --- 日志 ---
logging:
  log_dir: "./runs/logs"
  log_interval: 50            # 每50步打印日志
  use_tensorboard: true
  use_wandb: false
  project_name: "multimodal-det"
  experiment_name: "default"

# --- 随机种子 ---
seed: 42
